<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/board.css" />
    <link rel="stylesheet" href="./styles/board-overlay.css" />
    <link rel="stylesheet" href="./styles/board-task-card.css" />
    <link rel="stylesheet" href="./styles/addtask-form-elements.css" />
    <link rel="stylesheet" href="./styles/addtask.css" />
    <link rel="stylesheet" href="./styles/mobile/style-mobile.css" />
    <link rel="stylesheet" href="./styles/mobile/board-mobile.css" />
    <link rel="stylesheet" href="./styles/mobile/board-mobile-edit.css" />

    <title>Join - Board</title>
  </head>
  <body onload="initBoard()">
    <nav class="sidebar">
      <img src="./assets/main-page/join-logo-white.svg" alt="Join Logo" />
      <div class="nav-links">
        <a href="summaryuser.html">
          <img src="./assets/summary-page/summary-icon.svg" alt="" />
          Summary
        </a>
        <a href="addtask.html">
          <img src="./assets/summary-page/add-task-icon.svg" alt="" />
          Add Task
        </a>
        <a href="board.html" class="active">
          <img src="./assets/summary-page/board-icon.svg" alt="" />
          Board
        </a>
        <a href="contacts.html">
          <img src="./assets/summary-page/contacts-icon.svg" alt="" />
          Contacts
        </a>
      </div>
      <div class="legal-links">
        <a href="privacypolicy.html">Privacy Policy</a>
        <a href="legalnotice.html">Legal notice</a>
      </div>
    </nav>

    <main class="main-content">
      <header class="dashboard-header">
        <div class="header-content">
          <span>Kanban Project Management Tool</span>
          <div class="header-icons">
            <a href="help.html" class="help-link">
              <img src="./assets/summary-page/help.svg" alt="Help" />
            </a>
            <div class="user-menu-container">
              <div
                class="user-initials"
                id="user-initials"
                onclick="toggleUserMenu()"
                role="button"
                tabindex="0"
                aria-haspopup="true"
                aria-expanded="false"
              ></div>
              <nav
                class="user-dropdown"
                id="user-dropdown"
                aria-label="User menu"
              >
                <a href="legalnotice.html">Legal Notice</a>
                <a href="privacypolicy.html">Privacy Policy</a>
                <a
                  href="#"
                  onclick="
                    handleLogout();
                    return false;
                  "
                  >Log out</a
                >
              </nav>
            </div>
          </div>
        </div>
      </header>

      <section class="board-container">
        <header class="board-header">
          <h1>Board</h1>
          <div class="board-actions">
            <div class="search-bar" role="search">
              <input
                type="text"
                id="search-input"
                placeholder="Find Task"
                oninput="searchTasks()"
              />
              <div class="search-icon-container">
                <img src="./assets/icons/search-icon.svg" alt="Search" />
              </div>
            </div>
            <button class="btn-add-task" onclick="openAddTaskOverlay()">
              <span>Add task</span>
              <img src="./assets/icons/add-icon-white.svg" alt="Add Task" />
            </button>
          </div>
        </header>

        <div class="board-columns">
          <div
            class="board-column"
            id="column-triage"
            ondrop="drop(event, 'triage')"
            ondragover="
              allowDrop(event);
              highlight('triage-list');
            "
            ondragleave="removeHighlight('triage-list')"
          >
            <header class="column-header">
              <span id="column-title-triage">Triage</span>
              <div class="column-header-plus" onclick="openAddTaskOverlay()">
                <img src="./assets/icons/add-icon-blue.svg" alt="Add" />
              </div>
            </header>
            <div class="task-list" id="triage-list"></div>
          </div>

          <div
            class="board-column"
            id="column-todo"
            ondrop="drop(event, 'todo')"
            ondragover="
              allowDrop(event);
              highlight('todo-list');
            "
            ondragleave="removeHighlight('todo-list')"
          >
            <header class="column-header">
              <span id="column-title-todo">To do</span>
              <div class="column-header-plus" onclick="openAddTaskOverlay()">
                <img src="./assets/icons/add-icon-blue.svg" alt="Add" />
              </div>
            </header>
            <div class="task-list" id="todo-list"></div>
          </div>

          <div
            class="board-column"
            id="column-inprogress"
            ondrop="drop(event, 'inprogress')"
            ondragover="
              allowDrop(event);
              highlight('inprogress-list');
            "
            ondragleave="removeHighlight('inprogress-list')"
          >
            <header class="column-header">
              <span id="column-title-inprogress">In progress</span>
              <div class="column-header-plus" onclick="openAddTaskOverlay()">
                <img src="./assets/icons/add-icon-blue.svg" alt="Add" />
              </div>
            </header>
            <div class="task-list" id="inprogress-list"></div>
          </div>

          <div
            class="board-column"
            id="column-awaitfeedback"
            ondrop="drop(event, 'awaitfeedback')"
            ondragover="
              allowDrop(event);
              highlight('awaitfeedback-list');
            "
            ondragleave="removeHighlight('awaitfeedback-list')"
          >
            <header class="column-header">
              <span id="column-title-awaitfeedback">Await feedback</span>
              <div class="column-header-plus" onclick="openAddTaskOverlay()">
                <img src="./assets/icons/add-icon-blue.svg" alt="Add" />
              </div>
            </header>
            <div class="task-list" id="awaitfeedback-list"></div>
          </div>

          <div
            class="board-column"
            id="column-done"
            ondrop="drop(event, 'done')"
            ondragover="
              allowDrop(event);
              highlight('done-list');
            "
            ondragleave="removeHighlight('done-list')"
          >
            <header class="column-header">
              <span id="column-title-done">Done</span>
            </header>
            <div class="task-list" id="done-list"></div>
          </div>
        </div>
      </section>
    </main>


    <div id="board-overlays-mount"></div>

    <div
      class="overlay-container"
      id="task-details-overlay"
      onclick="closeTaskDetails()"
      role="dialog"
      aria-modal="true"
      aria-label="Task details"
    >
      <div
        class="overlay-content task-details-card"
        id="task-details-content"
        onclick="event.stopPropagation()"
      ></div>
    </div>



    <div class="landscape-block" role="alert">
      <p>Please rotate your device to portrait mode</p>
    </div>


    <script src="./scripts/templates/board-add-task-overlay.js"></script>
    <script src="./scripts/templates/board-mobile-edit-overlay.js"></script>
    <script src="./scripts/issue-collector/config.js"></script>
    <script src="./scripts/issue-collector/status-notifier.js"></script>
    <script type="module" src="./scripts/firebase-init.js"></script>
    <script src="./scripts/auth-defaults.js"></script>
    <script src="./scripts/auth-data.js"></script>
    <script src="./scripts/auth.js"></script>
    <script src="./scripts/user-initials.js"></script>
    <script src="./script.js"></script>
    <script src="./scripts/side-menu.js"></script>
    <script src="./scripts/user-menu.js"></script>
    <script src="./scripts/templates/addtask-template.js"></script>
    <script src="./scripts/addtask-utils.js"></script>
    <script src="./scripts/addtask-contacts.js"></script>
    <script src="./scripts/addtask-subtasks.js"></script>
    <script src="./scripts/addtask.js"></script>
    <script src="./scripts/board-form.js"></script>
    <script src="./scripts/templates/board-template.js"></script>
    <script src="./scripts/board-interactions.js"></script>
    <script src="./scripts/board-task-edit.js"></script>
    <script src="./scripts/board-rendering.js"></script>
    <script src="./scripts/board-touch-drag.js"></script>
    <script src="./scripts/board-data.js"></script>
    <script src="./scripts/board.js"></script>
    <script src="./scripts/board-mobile-edit.js"></script>
  </body>
</html>
